name: CI/CD Pipeline 

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: eduflow-app
  APP_PORT_PROD: 5000
  APP_PORT_TEST: 5001

jobs:
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Unit Tests
        run: pytest tests/test_unit.py -v

      - name: Run Integration Tests
        run: pytest tests/test_integration.py -v --cov=app --cov-report=term

  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: [self-hosted, linux, eduflow]
    steps:
      - name: Docker Hub Login
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Pull latest image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Stop old staging container
        run: docker rm -f eduflow-staging || true

      - name: Start staging container
        run: docker run -d --name eduflow-staging -p ${{ env.APP_PORT_TEST }}:5000 --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Docker Logout
        run: docker logout

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: [self-hosted, linux, eduflow]
    environment: production
    steps:
      - name: Docker Hub Login
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Pull latest image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Stop old production container
        run: docker rm -f eduflow-prod || true

      - name: Start production container
        run: docker run -d --name eduflow-prod -p ${{ env.APP_PORT_PROD }}:5000 --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Docker Logout
        run: docker logout